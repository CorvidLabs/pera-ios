# spec-sync v4 configuration
# Docs: https://github.com/CorvidLabs/spec-sync

specs_dir = "specs"
source_dirs = ["PeraWalletCore", "PeraWallet", "Classes", "PassKeyExtension"]
exclude_dirs = ["PeraWalletCore/Headers"]
exclude_patterns = ["*Tests.swift"]
required_sections = ["Purpose", "Public API", "Invariants", "Behavioral Examples", "Error Cases", "Dependencies", "Change Log"]
enforcement = "strict"

[lifecycle]
track_history = false
